<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>单词连环记 · 管理员</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:#0a0a0f;color:#e4e4e7;min-height:100vh;padding:16px}
.container{max-width:700px;margin:0 auto}
h1{font-size:1.3em;margin-bottom:4px;text-align:center}
.sub{color:#71717a;font-size:.82em;text-align:center;margin-bottom:20px}
.login-panel{background:#12121a;border:1px solid #1f1f2e;border-radius:14px;padding:20px;max-width:360px;margin:60px auto 0}
.login-panel input{width:100%;padding:12px;margin-bottom:10px;background:#1a1a26;border:2px solid #1f1f2e;border-radius:10px;color:#fff;font-size:.93em;outline:none}
.login-panel input:focus{border-color:#7c5cfc}
.login-panel button{width:100%;padding:12px;background:#7c5cfc;border:none;border-radius:10px;color:#fff;font-size:.95em;font-weight:700;cursor:pointer}
.login-panel button:hover{opacity:.9}
.error-text{color:#f87171;font-size:.8em;text-align:center;margin-top:6px}
.admin-panel{display:none}
.admin-panel.show{display:block}
.user-table{width:100%;border-collapse:collapse;margin-top:12px;font-size:.85em}
.user-table th,.user-table td{padding:10px 8px;text-align:left;border-bottom:1px solid #1f1f2e}
.user-table th{color:#71717a;font-size:.78em;text-transform:uppercase}
.user-table tr:hover{background:rgba(124,92,252,.05)}
.badge{padding:2px 8px;border-radius:4px;font-size:.78em;font-weight:600}
.badge-yes{background:rgba(52,211,153,.15);color:#34d399}
.badge-no{background:rgba(113,113,122,.15);color:#71717a}
.badge-expired{background:rgba(248,113,113,.15);color:#f87171}
.action-btn{padding:4px 10px;background:#1a1a26;border:1px solid #1f1f2e;border-radius:6px;color:#a1a1aa;cursor:pointer;font-size:.78em;transition:all .15s}
.action-btn:hover{border-color:#7c5cfc;color:#a78bfa}
.action-panel{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.7);align-items:center;justify-content:center}
.action-panel.show{display:flex}
.action-card{background:#12121a;border:1px solid #1f1f2e;border-radius:14px;padding:20px;width:100%;max-width:320px}
.action-card h3{margin-bottom:12px;font-size:1em}
.action-card select,.action-card button{width:100%;padding:10px;margin-bottom:8px;background:#1a1a26;border:2px solid #1f1f2e;border-radius:10px;color:#fff;font-size:.9em;outline:none;cursor:pointer}
.action-card select:focus{border-color:#7c5cfc}
.action-card .confirm-btn{background:#7c5cfc;border:none;color:#fff;font-weight:700}
.action-card .cancel-btn{background:transparent;color:#71717a;border:none;font-size:.85em}
.action-result{color:#34d399;font-size:.82em;text-align:center;margin-top:6px;min-height:18px}
.header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.refresh-btn{padding:6px 14px;background:#1a1a26;border:1px solid #1f1f2e;border-radius:8px;color:#a1a1aa;cursor:pointer;font-size:.82em}
.refresh-btn:hover{border-color:#7c5cfc}
@media(max-width:480px){.user-table{font-size:.75em}.user-table th,.user-table td{padding:8px 6px}}
</style>
</head>
<body>
<div class="container">
  <!-- Login -->
  <div class="login-panel" id="loginPanel">
    <h1>🔐 管理员登录</h1>
    <div class="sub">输入管理密码</div>
    <input type="password" id="adminPW" placeholder="管理密码">
    <button onclick="doLogin()">登 录</button>
    <div class="error-text" id="loginErr"></div>
  </div>

  <!-- Admin -->
  <div class="admin-panel" id="adminPanel">
    <div class="header-row">
      <h1>📋 用户管理</h1>
      <div>
        <button class="refresh-btn" onclick="loadUsers()">🔄 刷新</button>
        <span style="color:#71717a;font-size:.8em;margin-left:8px" id="lastRefresh"></span>
      </div>
    </div>
    <table class="user-table">
      <thead><tr><th>用户名</th><th>状态</th><th>套餐</th><th>到期</th><th>分享码</th><th>操作</th></tr></thead>
      <tbody id="userTbody"><tr><td colspan="6" style="text-align:center;color:#71717a">加载中...</td></tr></tbody>
    </table>
  </div>

  <!-- Action Popup -->
  <div class="action-panel" id="actionPanel">
    <div class="action-card">
      <h3>开通会员：<span id="actionUser"></span></h3>
      <select id="actionPlan">
        <option value="month">月费 ¥9.9</option>
        <option value="quarter">季费 ¥19.9</option>
        <option value="year">年费 ¥49.9</option>
      </select>
      <button class="confirm-btn" onclick="doActivate()">确认开通</button>
      <button class="cancel-btn" onclick="closeAction()">取消</button>
      <div class="action-result" id="actionResult"></div>
    </div>
  </div>
</div>

<script>
const SB_URL = 'https://xbstmjtypywukntjhdon.supabase.co';
const SB_KEY = 'sb_publishable_H_ltvJ4tK93xEu_DbXhDfQ_RTMT1C_S';
const ADMIN_PW = 'wordchain2024admin'; // ⚠️ 上线后请修改此密码
const sb = window.supabase.createClient(SB_URL, SB_KEY);
let adminKey = null;

function doLogin() {
  const pw = document.getElementById('adminPW').value;
  document.getElementById('loginErr').textContent = '';
  if (pw !== ADMIN_PW) { document.getElementById('loginErr').textContent = '密码错误'; return; }
  // 使用 Supabase Auth 登录一个管理员账号
  sb.auth.signInWithPassword({ email: 'admin@wordchain.app', password: pw }).then(({ error }) => {
    if (error) {
      // Admin account might not exist, use simple password gate
      adminKey = pw;
      document.getElementById('loginPanel').style.display = 'none';
      document.getElementById('adminPanel').classList.add('show');
      loadUsers();
    } else {
      adminKey = pw;
      document.getElementById('loginPanel').style.display = 'none';
      document.getElementById('adminPanel').classList.add('show');
      loadUsers();
    }
  }).catch(() => {
    // Fallback: just check password
    if (pw === ADMIN_PW) {
      adminKey = pw;
      document.getElementById('loginPanel').style.display = 'none';
      document.getElementById('adminPanel').classList.add('show');
      loadUsers();
    }
  });
}

function loadUsers() {
  document.getElementById('lastRefresh').textContent = new Date().toLocaleTimeString();
  sb.rpc('admin_list_users').then(({ data, error }) => {
    if (error) {
      // Fallback: use direct query
      return sb.from('users').select('username,paid,plan_type,created_at,expire_at,referral_code').order('created_at', { ascending: false }).limit(200);
    }
    return { data, error: null };
  }).then(({ data, error }) => {
    if (error) { document.getElementById('userTbody').innerHTML = '<tr><td colspan="6" style="color:#f87171">加载失败: ' + error.message + '</td></tr>'; return; }
    const now = new Date();
    document.getElementById('userTbody').innerHTML = (data || []).map(u => {
      const exp = u.expire_at ? new Date(u.expire_at) : null;
      const isActive = u.paid && exp && exp > now;
      const isExpired = u.paid && exp && exp <= now;
      let statusBadge = '<span class="badge badge-no">免费</span>';
      if (isActive) statusBadge = '<span class="badge badge-yes">VIP</span>';
      else if (isExpired) statusBadge = '<span class="badge badge-expired">已到期</span>';
      const planStr = u.plan_type === 'year' ? '年' : u.plan_type === 'quarter' ? '季' : u.plan_type === 'month' ? '月' : '-';
      const expStr = exp ? exp.toLocaleDateString('zh-CN') : '-';
      return '<tr>' +
        '<td><strong>' + u.username + '</strong></td>' +
        '<td>' + statusBadge + '</td>' +
        '<td>' + planStr + '</td>' +
        '<td>' + expStr + '</td>' +
        '<td style="font-size:.75em;color:#71717a">' + (u.referral_code || '-') + '</td>' +
        '<td><button class="action-btn" onclick="openAction(\'' + u.username + '\')">开通</button></td>' +
        '</tr>';
    }).join('');
  });
}

let currentActionUser = '';
function openAction(username) {
  currentActionUser = username;
  document.getElementById('actionUser').textContent = username;
  document.getElementById('actionPanel').classList.add('show');
  document.getElementById('actionResult').textContent = '';
}
function closeAction() { document.getElementById('actionPanel').classList.remove('show'); }

function doActivate() {
  const plan = document.getElementById('actionPlan').value;
  const months = plan === 'year' ? 12 : plan === 'quarter' ? 3 : 1;
  document.getElementById('actionResult').textContent = '处理中...';

  sb.rpc('admin_set_user_paid', {
    target_username: currentActionUser,
    plan_type_param: plan,
    duration_months: months
  }).then(({ data, error }) => {
    if (error) { document.getElementById('actionResult').textContent = '错误: ' + error.message; return; }
    document.getElementById('actionResult').textContent = data || '✓ 已开通: ' + currentActionUser;
    setTimeout(() => { closeAction(); loadUsers(); }, 1000);
  });
}

// Init
document.addEventListener('DOMContentLoaded', () => {
  // Check if already signed in as admin
  if (adminKey === ADMIN_PW) {
    document.getElementById('loginPanel').style.display = 'none';
    document.getElementById('adminPanel').classList.add('show');
    loadUsers();
  }
});
</script>
</body>
</html>
