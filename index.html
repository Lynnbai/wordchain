<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased;
  --bg:#f8f9fc;--card:#fff;--card2:#f1f3f7;--border:#e0e3e8;--accent:#7c5cfc;--accent2:#6d4eeb;
  --green:#10b981;--orange:#f59e0b;--red:#ef4444;--text:#1e1f24;--text2:#5a5d66;--text3:#9ca3af;
  background:var(--bg);color:var(--text);
}
body.theme-dark{
  --bg:#0a0a0f;--card:#12121a;--card2:#1a1a26;--border:#1f1f2e;--accent2:#a78bfa;
  --green:#34d399;--orange:#fbbf24;--red:#f87171;--text:#e4e4e7;--text2:#a1a1aa;--text3:#71717a;
}
.container{max-width:600px;margin:0 auto;padding:16px}

/* Auth Overlay */
.auth-overlay{position:fixed;inset:0;z-index:1000;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px}
.auth-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px 24px;width:100%;max-width:380px}
.auth-logo{text-align:center;font-size:1.8em;font-weight:800;background:linear-gradient(135deg,var(--accent2),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px}
.auth-sub{text-align:center;color:var(--text3);font-size:.88em;margin-bottom:20px}
.auth-tabs{display:flex;margin-bottom:18px;border-radius:10px;overflow:hidden;border:1px solid var(--border)}
.auth-tab-btn{flex:1;padding:9px 0;text-align:center;cursor:pointer;background:transparent;border:none;color:var(--text3);font-size:.9em;font-weight:600;transition:all .2s}
.auth-tab-btn.active{background:var(--accent);color:#fff}
.auth-input{width:100%;padding:12px 14px;margin-bottom:10px;background:var(--card2);border:2px solid var(--border);border-radius:10px;color:var(--text);font-size:.93em;outline:none}
.auth-input:focus{border-color:var(--accent)}
.auth-input::placeholder{color:var(--text3)}
.auth-btn{width:100%;padding:12px 0;background:var(--accent);border:none;border-radius:10px;color:#fff;font-size:.95em;font-weight:700;cursor:pointer;transition:opacity .2s}
.auth-btn:hover{opacity:.9}
.auth-btn:disabled{opacity:.5;cursor:default}
.auth-error{color:var(--red);font-size:.8em;text-align:center;margin-top:6px;min-height:18px}
.auth-field-label{font-size:.78em;color:var(--text3);margin-bottom:3px;display:block}
#registerForm{display:none}

/* Main App */
.main-app{display:none}
.main-app.show{display:block}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 0 8px}
.header .logo{font-size:1.4em;font-weight:800;background:linear-gradient(135deg,var(--accent2),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header-right{display:flex;gap:6px;align-items:center}
.version-select{padding:5px 8px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text2);font-size:.76em;cursor:pointer;outline:none}
.version-select:focus{border-color:var(--accent)}
.theme-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--card);font-size:1em;cursor:pointer;line-height:32px;text-align:center;transition:all .15s}
.theme-btn:hover{border-color:var(--accent)}

/* User Bar */
.user-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;margin-bottom:6px;background:var(--card2);border-radius:10px;border:1px solid var(--border);font-size:.78em;color:var(--text3)}
.user-bar .ub-name{color:var(--text);font-weight:600}
.ub-badge{padding:2px 8px;border-radius:5px;font-size:.82em;font-weight:600}
.ub-badge.free{color:var(--orange)}
.ub-badge.paid{color:var(--green)}
.ub-badge.expired{color:var(--red)}
.expiry-banner{display:none;text-align:center;padding:8px 12px;margin-bottom:6px;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);border-radius:10px;font-size:.82em;color:var(--red)}
.expiry-banner.show{display:block}
.expiry-banner strong{font-weight:700}
.user-bar .ub-actions{display:flex;gap:10px}
.user-bar .ub-actions span{cursor:pointer;transition:color .15s}
.ub-share{color:var(--accent2);font-size:.8em}
.ub-share:hover{text-decoration:underline}
.ub-logout{color:var(--text3);font-size:.8em}
.ub-logout:hover{color:var(--red)}

/* Tab Bar */
.tab-bar{display:flex;background:var(--card);border-radius:13px;padding:4px;margin:8px 0;border:1px solid var(--border)}
.tab-btn{flex:1;padding:9px 0;text-align:center;border-radius:9px;cursor:pointer;font-size:.9em;font-weight:600;color:var(--text3);background:transparent;border:none;transition:all .2s}
.tab-btn.active{background:var(--accent);color:#fff}

/* Search */
.panel{display:none}
.panel.show{display:block}
.search-wrap{position:relative;margin:0 0 10px}
.search-wrap input{width:100%;padding:13px 44px 13px 16px;background:var(--card);border:2px solid var(--border);border-radius:13px;color:var(--text);font-size:.95em;outline:none}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap input::placeholder{color:var(--text3)}
.search-wrap .search-icon{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:1.1em;pointer-events:none}
.suggestions{position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-top:4px;max-height:230px;overflow-y:auto;z-index:100;display:none}
.suggestions.show{display:block}
.suggestion-item{padding:9px 16px;cursor:pointer;font-size:.92em;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.suggestion-item:last-child{border-bottom:none}
.suggestion-item:hover,.suggestion-item.active{background:var(--card2)}
.suggestion-item .s-word{font-weight:600}
.suggestion-item .s-root{font-size:.75em;color:var(--accent2);background:rgba(124,92,252,.1);padding:2px 8px;border-radius:5px}
.random-btn{display:block;width:100%;padding:10px 0;background:var(--card2);border:1px solid var(--border);border-radius:11px;color:var(--accent2);font-size:.88em;cursor:pointer;transition:all .15s;margin-bottom:10px}
.random-btn:hover{background:var(--border)}

/* Flashcard */
.flash-nav{display:flex;align-items:center;justify-content:center;gap:10px;padding:6px 0}
.nav-btn{padding:9px 18px;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:.88em;cursor:pointer;transition:all .15s}
.nav-btn:hover{border-color:var(--accent);background:var(--card2)}
.nav-progress{font-size:.83em;color:var(--text3);min-width:76px;text-align:center}
.nav-progress strong{color:var(--accent2)}
.flash-options{display:flex;justify-content:center;gap:14px;padding:4px 0 10px}
.opt-btn{padding:6px 14px;background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text3);font-size:.76em;cursor:pointer;transition:all .15s}
.opt-btn.active{background:rgba(124,92,252,.12);border-color:var(--accent);color:var(--accent2)}
.opt-btn:hover{border-color:var(--accent)}

/* Word Card */
.result-area{display:none}
.result-area.show{display:block;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.word-card{background:var(--card);border-radius:15px;border:1px solid var(--border);overflow:hidden}
.word-header{padding:18px 20px 14px;border-bottom:1px solid var(--border)}
.word-main{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
.word-main .w-word{font-size:1.7em;font-weight:700;color:var(--text)}
.word-main .w-ipa{font-size:1em;color:var(--text3)}
.w-meaning{margin-top:5px;color:var(--text2);font-size:.93em}
.section-label{font-size:.73em;text-transform:uppercase;letter-spacing:.04em;color:var(--text3);margin-bottom:6px}
.root-section,.analysis-section,.related-section,.memory-section{padding:14px 20px;border-bottom:1px solid var(--border)}
.root-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(124,92,252,.1);border:1px solid rgba(124,92,252,.2);padding:5px 12px;border-radius:18px;font-size:.88em}
.root-badge .rb-root{font-weight:700;color:var(--accent2)}
.root-badge .rb-meaning{color:var(--text2)}
.form-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);padding:5px 12px;border-radius:18px;font-size:.88em;color:var(--orange)}
.analysis-text{font-size:.9em;color:var(--text);line-height:1.65}
.analysis-text .hl-root{color:var(--accent2);font-weight:600}
.related-grid{display:flex;flex-wrap:wrap;gap:7px;margin-top:7px}
.related-word{padding:7px 12px;background:var(--card2);border:1px solid var(--border);border-radius:9px;cursor:pointer;font-size:.87em;font-weight:500;color:var(--text);transition:all .15s}
.related-word:hover{border-color:var(--accent);background:rgba(124,92,252,.06)}
.related-word.current{border-color:var(--accent);background:rgba(124,92,252,.12);color:var(--accent2)}
.memory-section{background:linear-gradient(135deg,rgba(124,92,252,.04),rgba(167,139,250,.02))}
.memory-sentence{font-size:.95em;line-height:1.65;color:var(--text);padding:10px 14px;background:rgba(124,92,252,.05);border-radius:10px;border-left:3px solid var(--accent)}
.memory-sentence .mem-highlight{color:var(--accent2);font-weight:700}

/* Payment Overlay */
.payment-overlay{display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.7);align-items:center;justify-content:center;padding:16px}
.payment-overlay.show{display:flex}
.payment-card{background:var(--bg);border:1px solid var(--border);border-radius:18px;padding:24px 20px;width:100%;max-width:400px;text-align:center}
.payment-title{font-size:1.15em;font-weight:700;margin-bottom:2px}
.payment-sub{color:var(--text3);font-size:.83em;margin-bottom:16px}
.payment-qr-wrap{display:flex;gap:12px;justify-content:center;margin-bottom:12px}
.payment-qr{border-radius:12px;overflow:hidden;text-align:center}
.payment-qr img{width:120px;height:120px;display:block}
.payment-qr .qr-label{font-size:.7em;color:var(--text3);margin-top:4px}
.payment-plan-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:12px}
.payment-plan{padding:8px 14px;border-radius:8px;border:2px solid var(--border);background:var(--card);cursor:pointer;font-size:.82em;font-weight:600;color:var(--text2);transition:all .15s}
.payment-plan:hover{border-color:var(--accent)}
.payment-plan.active{border-color:var(--accent);background:rgba(124,92,252,.1);color:var(--accent)}
.payment-price{font-size:1.05em;margin-bottom:12px}
.payment-price .big{font-size:1.5em;font-weight:800;color:var(--accent2)}
.payment-steps{text-align:left;font-size:.78em;color:var(--text2);margin:12px 0;line-height:1.9}
.payment-steps span.num{display:inline-block;width:18px;height:18px;line-height:18px;text-align:center;background:var(--accent);color:#fff;border-radius:50%;font-size:.75em;margin-right:6px}
.payment-confirm-btn{width:100%;padding:11px 0;background:var(--green);border:none;border-radius:10px;color:#fff;font-size:.92em;font-weight:700;cursor:pointer;margin-top:8px;transition:opacity .2s}
.payment-confirm-btn:hover{opacity:.9}
.payment-confirm-btn:disabled{opacity:.5;cursor:default}
.payment-confirm-tip{font-size:.73em;color:var(--text3);margin-top:6px}
.payment-close{margin-top:14px;color:var(--text3);cursor:pointer;font-size:.82em}
.payment-close:hover{color:var(--text)}

/* Empty / Stats / Toast */
.empty-state{text-align:center;padding:50px 16px;color:var(--text3)}
.empty-state .empty-icon{font-size:2.8em;margin-bottom:10px}
.empty-state p{font-size:.9em}
.stats-bar{display:flex;justify-content:center;padding:10px 0;font-size:.76em;color:var(--text3)}
.stats-bar strong{color:var(--text2);margin:0 2px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);padding:9px 18px;border-radius:10px;font-size:.83em;color:var(--text);box-shadow:0 6px 24px rgba(0,0,0,.35);z-index:3000;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}
.lock-icon{display:inline-block;margin-left:4px;font-size:.85em}
@media(max-width:400px){.word-main .w-word{font-size:1.4em}.nav-btn{padding:9px 14px;font-size:.83em}.payment-qr img{width:100px;height:100px}}
</style>
</head>
<body>

<!-- ===== Auth Overlay ===== -->
<div class="auth-overlay" id="authOverlay">
  <div class="auth-card">
    <div class="auth-logo">单词连环记</div>
    <div class="auth-sub">形近词串联记忆 · 四级备考利器</div>
    <div class="auth-tabs">
      <button class="auth-tab-btn active" id="authTabLogin" onclick="switchAuthTab('login')">登录</button>
      <button class="auth-tab-btn" id="authTabRegister" onclick="switchAuthTab('register')">注册</button>
    </div>
    <div id="loginForm">
      <label class="auth-field-label">用户名</label>
      <input class="auth-input" type="text" id="loginUsername" placeholder="输入用户名" autocomplete="username">
      <label class="auth-field-label">密码</label>
      <input class="auth-input" type="password" id="loginPassword" placeholder="输入密码（6位以上）" autocomplete="current-password">
      <button class="auth-btn" id="loginBtn" onclick="handleLogin()">登 录</button>
      <div class="auth-error" id="loginError"></div>
    </div>
    <div id="registerForm">
      <label class="auth-field-label">用户名</label>
      <input class="auth-input" type="text" id="regUsername" placeholder="字母+数字，如 admin123" autocomplete="off">
      <label class="auth-field-label">密码</label>
      <input class="auth-input" type="password" id="regPassword" placeholder="设置密码（6位以上）" autocomplete="new-password">
      <label class="auth-field-label">分享码（选填，填了双方各+7天试用）</label>
      <input class="auth-input" type="text" id="regReferral" placeholder="朋友给的分享码" autocomplete="off">
      <button class="auth-btn" id="regBtn" onclick="handleRegister()">注 册</button>
      <div class="auth-error" id="regError"></div>
    </div>
  </div>
</div>

<!-- ===== Main App ===== -->
<div class="main-app" id="mainApp">
  <div class="container">
    <div class="header">
      <div class="logo">单词连环记</div>
      <div class="header-right">
        <select class="version-select" id="versionSelect" onchange="switchVersion()">
          <option value="less">简略版（免费）</option>
        </select>
        <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="切换主题">🌙</button>
      </div>
    </div>

    <div class="expiry-banner" id="expiryBanner">
      ⚠️ 您的会员已到期，已自动切换为<strong>简略版</strong>。续费即可恢复完整词库。
    </div>

    <div class="user-bar">
      <span class="ub-name" id="ubName">...</span>
      <span class="ub-badge" id="ubBadge">加载中</span>
      <span id="ubStatus" style="font-size:.82em;color:var(--text2)"></span>
      <div class="ub-actions">
        <span class="ub-share" id="ubShare" onclick="showShareCode()"></span>
        <span class="ub-logout" onclick="handleLogout()">退出</span>
      </div>
    </div>

    <div class="tab-bar">
      <button class="tab-btn active" data-tab="flashcard" onclick="switchTab('flashcard')">📖 记单词</button>
      <button class="tab-btn" data-tab="search" onclick="switchTab('search')">🔍 查单词</button>
    </div>

    <!-- Search -->
    <div class="panel" id="searchPanel">
      <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="搜索单词..." autocomplete="off">
        <span class="search-icon">⌘</span>
        <div class="suggestions" id="suggestions"></div>
      </div>
      <button class="random-btn" id="randomBtn">✨ 随便看看</button>
      <div class="stats-bar" id="statsBar"></div>
      <div class="result-area" id="searchResult"></div>
      <div class="empty-state" id="searchEmpty">
        <div class="empty-icon">📖</div><p>输入单词查看词根拆解和串联记忆</p>
      </div>
    </div>

    <!-- Flashcard -->
    <div class="panel show" id="flashcardPanel">
      <div class="flash-nav">
        <button class="nav-btn" onclick="prevCard()">◀ 上一个</button>
        <span class="nav-progress" id="progressText">第 <strong>-</strong>/<span id="totalText">-</span> 个</span>
        <button class="nav-btn" onclick="nextCard()">下一个 ▶</button>
      </div>
      <div class="flash-options">
        <button class="opt-btn active" id="shuffleOffBtn" onclick="setShuffle(false)">📋 顺序</button>
        <button class="opt-btn" id="shuffleOnBtn" onclick="setShuffle(true)">🎲 随机</button>
      </div>
      <div class="result-area" id="flashResult"></div>
      <div class="empty-state" id="flashEmpty">
        <div class="empty-icon">📖</div><p>正在加载词库...</p>
      </div>
    </div>
  </div>
</div>

<!-- ===== Payment Overlay ===== -->
<div class="payment-overlay" id="paymentOverlay">
  <div class="payment-card">
    <div class="payment-title">🔓 解锁完整词库</div>
    <div class="payment-sub">当前：简略版（151词） → 完整四级词库（4446词）</div>

    <div class="payment-plan-row">
      <button class="payment-plan active" data-plan="month" data-price="9.9" onclick="selectPlan('month')">月 ¥9.9</button>
      <button class="payment-plan" data-plan="quarter" data-price="19.9" onclick="selectPlan('quarter')">季 ¥19.9</button>
      <button class="payment-plan" data-plan="year" data-price="49.9" onclick="selectPlan('year')">年 ¥49.9</button>
    </div>

    <div class="payment-price">应付 <span class="big" id="payAmount">¥9.9</span></div>

    <div class="payment-qr-wrap">
      <div class="payment-qr">
        <img src="微信收款码.png" alt="微信">
        <div class="qr-label">微信扫码</div>
      </div>
      <div class="payment-qr">
        <img src="支付宝收款码.png" alt="支付宝">
        <div class="qr-label">支付宝扫码</div>
      </div>
    </div>

    <div class="payment-steps">
      <div><span class="num">1</span> 截图或长按保存付款码</div>
      <div><span class="num">2</span> 打开微信/支付宝扫码付款</div>
      <div><span class="num">3</span> ⚠️ 付款时<strong>备注你的用户名：<span id="payNoteUser"></span></strong></div>
      <div><span class="num">4</span> 付款后点击下方按钮刷新状态</div>
    </div>

    <button class="payment-confirm-btn" id="payConfirmBtn" onclick="checkPaymentStatus()">
      ✅ 我已完成付款，点此确认
    </button>
    <div class="payment-confirm-tip" id="payConfirmTip"></div>

    <div class="payment-close" onclick="closePayment()">暂不付款，继续使用简略版</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== Config =====
const SB_URL = 'https://xbstmjtypywukntjhdon.supabase.co';
const SB_KEY = 'sb_publishable_H_ltvJ4tK93xEu_DbXhDfQ_RTMT1C_S';
const sb = window.supabase.createClient(SB_URL, SB_KEY);

// Version data mapping
const VERSION_MAP = {
  less: 'data_less.json',
  cet4: 'data_cet4.json',
  cet6: 'data_cet6.json',
  kaoyan: 'data_kaoyan.json'
};
const PAID_VERSIONS = ['cet4','cet6','kaoyan'];

// ===== State =====
let currentUser = null, userProfile = null, authMode = 'login';
let wordsData = [], wordIndex = {}, groupsData = {};
let currentTab = 'flashcard', currentVersion = 'less';
let flashQueue = [], flashIdx = 0, shuffleMode = false;
let currentPlan = 'month', planPrices = { month: 9.9, quarter: 19.9, year: 49.9 };

// ===== Theme =====
function initTheme() {
  const t = localStorage.getItem('wc_theme') || 'light';
  document.body.classList.toggle('theme-dark', t === 'dark');
  document.getElementById('themeBtn').textContent = t === 'dark' ? '☀️' : '🌙';
}
function toggleTheme() {
  const d = document.body.classList.toggle('theme-dark');
  localStorage.setItem('wc_theme', d ? 'dark' : 'light');
  document.getElementById('themeBtn').textContent = d ? '☀️' : '🌙';
}

// ===== Auth =====
function switchAuthTab(mode) {
  authMode = mode;
  document.getElementById('authTabLogin').classList.toggle('active', mode==='login');
  document.getElementById('authTabRegister').classList.toggle('active', mode==='register');
  document.getElementById('loginForm').style.display = mode==='login'?'block':'none';
  document.getElementById('registerForm').style.display = mode==='register'?'block':'none';
}

function toEmail(u) {
  u = u.trim().toLowerCase();
  if (/^\d+$/.test(u)) u = 'u' + u;
  return u + '@wordchain.app';
}

function genCode() {
  const c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let r = ''; for (let i=0;i<6;i++) r += c[Math.floor(Math.random()*c.length)];
  return r;
}

async function handleRegister() {
  const un = document.getElementById('regUsername').value.trim();
  const pw = document.getElementById('regPassword').value;
  const ref = document.getElementById('regReferral').value.trim().toUpperCase();
  const e = document.getElementById('regError');
  if (!un||un.length<2||un.length>20||!/^[a-zA-Z0-9_\u4e00-\u9fa5]+$/.test(un)) { e.textContent='用户名需2-20位字母/数字/中文/下划线'; return; }
  if (!pw||pw.length<6) { e.textContent='密码需6位以上'; return; }
  const btn = document.getElementById('regBtn'); btn.disabled = true; btn.textContent = '注册中...'; e.textContent = '';
  try {
    const email = toEmail(un);
    const { data: a, error: ae } = await sb.auth.signUp({ email, password: pw });
    if (ae) throw ae;
    if (!a.user) throw new Error('注册失败');
    let rid = null;
    if (ref) { const rd = await sb.from('users').select('id').eq('referral_code',ref).single(); if (rd.data) rid = rd.data.id; }
    const code = genCode();
    const exp = new Date(); exp.setDate(exp.getDate() + 7);
    const { error: ie } = await sb.from('users').insert({
      id: a.user.id, username: un, expire_at: exp.toISOString(), referral_code: code,
      referrer_id: rid, plan_type: null, paid: false
    });
    if (ie) throw ie;
    if (rid) await sb.rpc('add_trial_days', { user_id: rid, days: 7 });
    await loadProfile(a.user); showApp();
  } catch (x) { e.textContent = x.message || '注册失败'; }
  finally { btn.disabled = false; btn.textContent = '注 册'; }
}

async function handleLogin() {
  const un = document.getElementById('loginUsername').value.trim();
  const pw = document.getElementById('loginPassword').value;
  const e = document.getElementById('loginError');
  if (!un||!pw) { e.textContent='请填写用户名和密码'; return; }
  const btn = document.getElementById('loginBtn'); btn.disabled = true; btn.textContent = '登录中...'; e.textContent = '';
  try {
    const { data, error } = await sb.auth.signInWithPassword({ email: toEmail(un), password: pw });
    if (error) throw error;
    await loadProfile(data.user); showApp();
  } catch (x) { e.textContent = '用户名或密码错误'; }
  finally { btn.disabled = false; btn.textContent = '登 录'; }
}

async function handleLogout() {
  await sb.auth.signOut(); currentUser = null; userProfile = null;
  document.getElementById('authOverlay').style.display = 'flex';
  document.getElementById('mainApp').classList.remove('show');
}

async function loadProfile(user) {
  currentUser = user;
  const { data } = await sb.from('users').select('*').eq('id', user.id).single();
  userProfile = data;
}

// ===== User Bar & Status =====
function updateUserBar() {
  if (!userProfile) return;
  const now = new Date();
  const exp = userProfile.expire_at ? new Date(userProfile.expire_at) : null;
  document.getElementById('ubName').textContent = userProfile.username;
  document.getElementById('ubShare').textContent = '分享码:' + userProfile.referral_code;

  if (userProfile.paid && exp && exp > now) {
    document.getElementById('ubBadge').textContent = 'VIP';
    document.getElementById('ubBadge').className = 'ub-badge paid';
    const d = userProfile.plan_type === 'year' ? '年' : userProfile.plan_type === 'quarter' ? '季' : '月';
    document.getElementById('ubStatus').textContent = d + '费会员 · ' + Math.ceil((exp-now)/86400000) + '天后到期';
    document.getElementById('expiryBanner').classList.remove('show');
    updateVersionSelector(true);
  } else if (userProfile.paid && exp && exp <= now) {
    // Expired → auto downgrade
    document.getElementById('ubBadge').textContent = '已到期';
    document.getElementById('ubBadge').className = 'ub-badge expired';
    document.getElementById('ubStatus').textContent = '';
    document.getElementById('expiryBanner').classList.add('show');
    currentVersion = 'less';
    document.getElementById('versionSelect').value = 'less';
    updateVersionSelector(false);
    loadWordData();
  } else if (!userProfile.paid && exp && exp > now) {
    // Free trial
    const d = Math.ceil((exp - now) / 86400000);
    document.getElementById('ubBadge').textContent = '试用';
    document.getElementById('ubBadge').className = 'ub-badge free';
    document.getElementById('ubStatus').textContent = d + '天后到期';
    document.getElementById('expiryBanner').classList.remove('show');
    updateVersionSelector(false);
  } else {
    // No trial, not paid
    document.getElementById('ubBadge').textContent = '免费';
    document.getElementById('ubBadge').className = 'ub-badge free';
    document.getElementById('ubStatus').textContent = '';
    document.getElementById('expiryBanner').classList.remove('show');
    updateVersionSelector(false);
  }
}

function updateVersionSelector(isPaid) {
  const sel = document.getElementById('versionSelect');
  sel.innerHTML = '';
  if (isPaid) {
    PAID_VERSIONS.forEach(v => {
      const o = document.createElement('option');
      o.value = v; o.textContent = v === 'cet4' ? '四级词库' : v === 'cet6' ? '六级词库' : '考研词库';
      sel.appendChild(o);
    });
    if (PAID_VERSIONS.includes(currentVersion)) sel.value = currentVersion;
    else { sel.value = 'cet4'; currentVersion = 'cet4'; }
  } else {
    const o = document.createElement('option');
    o.value = 'less'; o.textContent = '简略版（免费）';
    sel.appendChild(o);
    currentVersion = 'less';
  }
}

function isPaidActive() {
  if (!userProfile) return false;
  const now = new Date();
  return userProfile.paid && userProfile.expire_at && new Date(userProfile.expire_at) > now;
}

function showShareCode() {
  if (!userProfile) return;
  const t = '【单词连环记】邀请码：' + userProfile.referral_code + '\n注册时填写后，双方各多得7天免费试用！';
  if (navigator.clipboard) { navigator.clipboard.writeText(t).then(() => showToast('已复制')); }
}

// ===== Version Switch =====
async function switchVersion() {
  const v = document.getElementById('versionSelect').value;
  if (!isPaidActive() && v !== 'less') {
    document.getElementById('paymentOverlay').classList.add('show');
    document.getElementById('payNoteUser').textContent = userProfile.username;
    document.getElementById('versionSelect').value = 'less';
    return;
  }
  if (v === currentVersion) return;
  currentVersion = v;
  await loadWordData();
}

// ===== Word Data =====
async function loadWordData() {
  const file = VERSION_MAP[currentVersion] || 'data_less.json';
  try {
    const resp = await fetch(file);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    wordsData = data.words || [];
    wordIndex = {}; groupsData = {};
    wordsData.forEach(w => { wordIndex[w.word.toLowerCase()] = w; });
    updateStats(); resetFlashQueue();
    document.getElementById('flashEmpty').style.display = 'none';
  } catch (e) {
    document.getElementById('flashEmpty').innerHTML = '<div class="empty-icon">⚠️</div><p>词库加载失败</p><p style="font-size:.8em;color:var(--text3);">' + e.message + '</p>';
  }
}

function updateStats() {
  const g = new Set(wordsData.map(w => w.groupId)).size;
  document.getElementById('statsBar').innerHTML = '词库共<strong>' + wordsData.length + '</strong>个单词 · <strong>' + g + '</strong>个词组';
}

// ===== Tab =====
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.getElementById('searchPanel').classList.toggle('show', tab === 'search');
  document.getElementById('flashcardPanel').classList.toggle('show', tab === 'flashcard');
  if (tab === 'flashcard') updateFlashDisplay();
}

// ===== Search =====
const searchEl = document.getElementById('searchInput');
const sugEl = document.getElementById('suggestions');
let selIdx = -1;

searchEl.addEventListener('input', () => {
  const q = searchEl.value.trim().toLowerCase(); selIdx = -1;
  if (!q) { sugEl.classList.remove('show'); return; }
  const hits = wordsData.filter(w => w.word.toLowerCase().includes(q)).slice(0, 8);
  if (!hits.length) { sugEl.classList.remove('show'); return; }
  sugEl.innerHTML = hits.map((w, i) =>
    '<div class="suggestion-item" data-idx="' + i + '" data-word="' + w.word + '">' +
    '<span class="s-word">' + hlMatch(w.word, q) + '</span>' +
    (w.root ? '<span class="s-root">' + w.root + '</span>' : '<span class="s-root">形近</span>') +
    '</div>').join('');
  sugEl.classList.add('show');
  sugEl.querySelectorAll('.suggestion-item').forEach(item => {
    item.addEventListener('click', () => {
      searchEl.value = item.dataset.word; sugEl.classList.remove('show'); showSearch(item.dataset.word);
    });
  });
});

searchEl.addEventListener('keydown', e => {
  const items = sugEl.querySelectorAll('.suggestion-item');
  if (!sugEl.classList.contains('show') || !items.length) {
    if (e.key === 'Enter') { const q = searchEl.value.trim(); if (q) { sugEl.classList.remove('show'); showSearch(q); } }
    return;
  }
  if (e.key === 'ArrowDown') { e.preventDefault(); selIdx = Math.min(selIdx + 1, items.length - 1); items.forEach((it,i) => it.classList.toggle('active', i===selIdx)); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); selIdx = Math.max(selIdx - 1, 0); items.forEach((it,i) => it.classList.toggle('active', i===selIdx)); }
  else if (e.key === 'Enter') { e.preventDefault(); if (selIdx >= 0 && items[selIdx]) { searchEl.value = items[selIdx].dataset.word; sugEl.classList.remove('show'); showSearch(items[selIdx].dataset.word); } }
  else if (e.key === 'Escape') sugEl.classList.remove('show');
});

document.addEventListener('click', e => { if (!e.target.closest('.search-wrap')) sugEl.classList.remove('show'); });
function hlMatch(w, q) { const i = w.toLowerCase().indexOf(q); return i===-1 ? w : w.slice(0,i)+'<span style="color:var(--accent2);font-weight:700">'+w.slice(i,i+q.length)+'</span>'+w.slice(i+q.length); }

document.getElementById('randomBtn').addEventListener('click', () => {
  if (!wordsData.length) return;
  const r = wordsData[Math.floor(Math.random() * wordsData.length)];
  searchEl.value = r.word; showSearch(r.word);
});

function showSearch(q) {
  const w = findWord(q.trim().toLowerCase());
  if (!w) {
    document.getElementById('searchResult').innerHTML = '<div class="word-card"><div style="padding:36px;text-align:center;color:var(--text3)"><div style="font-size:2em;margin-bottom:6px">🔍</div><p>未找到</p></div></div>';
    document.getElementById('searchResult').classList.add('show');
    document.getElementById('searchEmpty').style.display = 'none';
    return;
  }
  document.getElementById('searchResult').innerHTML = renderCard(w);
  document.getElementById('searchResult').classList.add('show');
  document.getElementById('searchEmpty').style.display = 'none';
}

// ===== Flashcard =====
function resetFlashQueue() {
  flashQueue = shuffleMode ? [...wordsData].sort(() => Math.random() - 0.5) : [...wordsData];
  flashIdx = 0;
  document.getElementById('totalText').textContent = flashQueue.length;
}

function setShuffle(on) {
  shuffleMode = on;
  document.getElementById('shuffleOffBtn').classList.toggle('active', !on);
  document.getElementById('shuffleOnBtn').classList.toggle('active', on);
  resetFlashQueue(); updateFlashDisplay();
}

function prevCard() { if (!flashQueue.length) return; flashIdx = (flashIdx-1+flashQueue.length)%flashQueue.length; updateFlashDisplay(); }
function nextCard() { if (!flashQueue.length) return; flashIdx = (flashIdx+1)%flashQueue.length; updateFlashDisplay(); }

function updateFlashDisplay() {
  if (!flashQueue.length) { document.getElementById('flashResult').innerHTML = '<div class="word-card"><div style="padding:36px;text-align:center;color:var(--text3)"><p>词库为空</p></div></div>'; document.getElementById('flashResult').classList.add('show'); return; }
  const w = flashQueue[flashIdx];
  document.getElementById('flashResult').innerHTML = renderCard(w);
  document.getElementById('flashResult').classList.add('show');
  document.getElementById('progressText').innerHTML = '第 <strong>' + (flashIdx+1) + '</strong>/<span id="totalText">' + flashQueue.length + '</span> 个';
}

let tsX = 0;
document.addEventListener('DOMContentLoaded', () => {
  const el = document.getElementById('flashcardPanel');
  el.addEventListener('touchstart', e => { tsX = e.touches[0].clientX; });
  el.addEventListener('touchend', e => {
    if (currentTab !== 'flashcard') return;
    const d = tsX - e.changedTouches[0].clientX;
    if (Math.abs(d) > 60) { if (d > 0) nextCard(); else prevCard(); }
  });
});

// ===== Render =====
function renderCard(w) {
  const same = wordsData.filter(x => x.groupId === w.groupId && x.word !== w.word);
  const s = w.sentence || '';
  let h = '<div class="word-card"><div class="word-header"><div class="word-main"><span class="w-word">' + w.word + '</span><span class="w-ipa">' + w.ipa + '</span></div><div class="w-meaning">' + w.meaning + '</div></div>';
  if (w.root) {
    h += '<div class="root-section"><div class="section-label">词根拆解</div><div class="root-badge">词根 <span class="rb-root">' + w.root + '</span>' + (w.rootMeaning ? '<span class="rb-meaning"> · ' + w.rootMeaning + '</span>' : '') + '</div></div>';
  } else {
    h += '<div class="root-section"><div class="section-label">形近词组</div><div class="form-badge">📎 形近词串联记忆</div></div>';
  }
  if (w.analysis) h += '<div class="analysis-section"><div class="section-label">构成分析</div><div class="analysis-text">' + fmtAnalysis(w.analysis) + '</div></div>';
  if (same.length) {
    h += '<div class="related-section"><div class="section-label">同组关联单词 (' + (same.length+1) + '个)</div><div class="related-grid"><span class="related-word current">' + w.word + '</span>' + same.map(x => '<span class="related-word" onclick="clickRelated(\'' + x.word + '\')">' + x.word + '</span>').join('') + '</div></div>';
  }
  if (s) h += '<div class="memory-section"><div class="section-label">串联记忆口诀</div><div class="memory-sentence">' + hlSentence(s, w.groupId) + '</div></div>';
  h += '</div>';
  return h;
}

function clickRelated(word) {
  if (currentTab === 'search') { searchEl.value = word; showSearch(word); }
  else { const i = flashQueue.findIndex(x => x.word.toLowerCase() === word.toLowerCase()); if (i >= 0) { flashIdx = i; updateFlashDisplay(); } }
}

function findWord(q) {
  if (wordIndex[q]) return wordIndex[q];
  for (const k of Object.keys(wordIndex)) { if (k.startsWith(q)) return wordIndex[k]; }
  for (const k of Object.keys(wordIndex)) { if (k.includes(q)) return wordIndex[k]; }
  return null;
}

function fmtAnalysis(t) { return t.replace(/([a-z]+)\(([^)]+)\)/gi,'<span class="hl-root">$1</span>($2)').replace(/→/g,'<span style="color:var(--accent2)">→</span>'); }
function hlSentence(s, gid) {
  const gw = wordsData.filter(w => w.groupId === gid).map(w => w.word);
  if (!gw.length) return s;
  let r = s;
  gw.sort((a,b) => b.length - a.length).forEach(w => {
    r = r.replace(new RegExp('\\b(' + w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')\\b','gi'), '<span class="mem-highlight">$1</span>');
  });
  return r;
}

// ===== Payment =====
function selectPlan(plan) {
  currentPlan = plan;
  document.querySelectorAll('.payment-plan').forEach(b => b.classList.toggle('active', b.dataset.plan === plan));
  document.getElementById('payAmount').textContent = '¥' + planPrices[plan];
}

function checkPaymentStatus() {
  const btn = document.getElementById('payConfirmBtn');
  btn.disabled = true; btn.textContent = '检查中...';
  document.getElementById('payConfirmTip').textContent = '';
  
  sb.from('users').select('paid,plan_type,expire_at').eq('id', currentUser.id).single().then(({ data }) => {
    if (data && data.paid) {
      userProfile.paid = true;
      userProfile.plan_type = data.plan_type;
      userProfile.expire_at = data.expire_at;
      updateUserBar();
      document.getElementById('paymentOverlay').classList.remove('show');
      currentVersion = 'cet4';
      document.getElementById('versionSelect').value = 'cet4';
      updateVersionSelector(true);
      loadWordData();
      showToast('✅ 已开通！完整词库解锁');
    } else {
      document.getElementById('payConfirmTip').textContent = '暂未确认，付款后请稍等。如已付款，请稍后重试。';
      btn.disabled = false; btn.textContent = '✅ 我已完成付款，点此确认';
    }
  });
}

function closePayment() { document.getElementById('paymentOverlay').classList.remove('show'); }

function showPayment() {
  document.getElementById('payNoteUser').textContent = userProfile.username;
  selectPlan('month');
  document.getElementById('paymentOverlay').classList.add('show');
}

// ===== Toast =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ===== Init =====
function showApp() {
  document.getElementById('authOverlay').style.display = 'none';
  document.getElementById('mainApp').classList.add('show');
  updateUserBar();
  loadWordData();
}

window.addEventListener('load', async () => {
  initTheme();
  const { data: { session } } = await sb.auth.getSession();
  if (session && session.user) { await loadProfile(session.user); if (userProfile) showApp(); }
  sb.auth.onAuthStateChange(async (ev, sess) => {
    if (ev === 'SIGNED_OUT') { currentUser = null; userProfile = null; }
  });
});
</script>
