<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>单词连环记</title>

    c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
    t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
    y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
})(window, document, "clarity", "script", "x5b89oiits");
</script>

<style>
/* ====== CSS Variables ====== */
:root, .theme-dark {
  --bg: #0a0a0f;
  --card: #12121a;
  --card2: #1a1a26;
  --border: #1f1f2e;
  --accent: #7c5cfc;
  --accent2: #a78bfa;
  --green: #34d399;
  --orange: #f59e0b;
  --red: #f87171;
  --text: #e4e4e7;
  --text2: #a1a1aa;
  --text3: #71717a;
  --overlay-bg: rgba(0,0,0,0.75);
}
.theme-light {
  --bg: #f5f5f7;
  --card: #ffffff;
  --card2: #f0f0f5;
  --border: #e0e0e8;
  --accent: #6d28d9;
  --accent2: #7c3aed;
  --text: #1a1a2e;
  --text2: #52525b;
  --text3: #a1a1aa;
  --overlay-bg: rgba(0,0,0,0.4);
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  line-height: 1.6; min-height: 100vh; -webkit-font-smoothing: antialiased;
}
.container { max-width: 600px; margin: 0 auto; padding: 16px; }

/* ====== Auth Overlay ====== */
.auth-overlay {
  position: fixed; inset: 0; z-index: 1000;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.auth-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 20px; padding: 32px 24px;
  width: 100%; max-width: 380px;
}
.auth-logo {
  text-align: center; font-size: 1.8em; font-weight: 800;
  background: linear-gradient(135deg, var(--accent2), var(--accent));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; margin-bottom: 4px;
}
.auth-sub { text-align: center; color: var(--text3); font-size: 0.88em; margin-bottom: 24px; }
.auth-tabs { display: flex; gap: 0; margin-bottom: 20px; border-radius: 10px; overflow: hidden; border:1px solid var(--border); }
.auth-tab-btn {
  flex:1; padding: 10px 0; text-align: center; cursor: pointer;
  background: transparent; border: none; color: var(--text3);
  font-size: 0.9em; font-weight: 600; transition: all 0.2s;
}
.auth-tab-btn.active { background: var(--accent); color: #fff; }
.auth-input {
  width: 100%; padding: 13px 16px; margin-bottom: 12px;
  background: var(--card2); border: 2px solid var(--border);
  border-radius: 12px; color: var(--text); font-size: 0.95em; outline: none;
}
.auth-input:focus { border-color: var(--accent); }
.auth-input::placeholder { color: var(--text3); }
.auth-btn {
  width: 100%; padding: 13px 0; background: var(--accent);
  border: none; border-radius: 12px; color: #fff;
  font-size: 1em; font-weight: 700; cursor: pointer; transition: opacity 0.2s;
}
.auth-btn:hover { opacity: 0.9; }
.auth-btn:disabled { opacity: 0.5; cursor: default; }
.auth-extra { margin-top: 12px; font-size: 0.78em; color: var(--text3); }
.auth-extra span { color: var(--accent2); cursor: pointer; text-decoration: underline; }
.auth-error { color: var(--red); font-size: 0.82em; text-align: center; margin-top: 8px; min-height: 20px; }
.auth-field-label { font-size: 0.8em; color: var(--text3); margin-bottom: 4px; display: block; }
.auth-referral-row { display: flex; gap: 8px; align-items: flex-end; margin-bottom: 12px; }
.auth-referral-row input { flex: 1; margin-bottom: 0; }

/* ====== Header ====== */
.header { display: flex; align-items: center; justify-content: space-between; padding: 12px 0 8px; }
.header .logo {
  font-size: 1.4em; font-weight: 800;
  background: linear-gradient(135deg, var(--accent2), var(--accent));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header-actions { display: flex; gap: 8px; align-items: center; }
.header-btn {
  width: 34px; height: 34px; border-radius: 10px; border: 1px solid var(--border);
  background: var(--card); color: var(--text2); cursor: pointer;
  font-size: 1em; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.header-btn:hover { border-color: var(--accent); color: var(--accent2); }
.header-version {
  padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--card); color: var(--text2); font-size: 0.78em;
  cursor: pointer; outline: none; transition: all 0.15s;
}
.header-version:focus { border-color: var(--accent); }

/* ====== User bar ====== */
.user-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px; margin-bottom: 8px;
  background: var(--card2); border-radius: 10px; border: 1px solid var(--border);
  font-size: 0.8em; color: var(--text3);
}
.user-bar .ub-left { display: flex; align-items: center; gap: 8px; }
.user-bar .ub-name { color: var(--text); font-weight: 600; }
.user-bar .ub-badge {
  padding: 2px 8px; border-radius: 6px; font-size: 0.85em; font-weight: 600;
}
.ub-badge.free { background: rgba(245,158,11,0.15); color: var(--orange); }
.ub-badge.paid { background: rgba(52,211,153,0.15); color: var(--green); }
.ub-badge.expired { background: rgba(248,113,113,0.15); color: var(--red); }
.user-bar .ub-days { color: var(--text2); font-size: 0.85em; }
.user-bar .ub-logout { color: var(--text3); cursor: pointer; font-size: 0.85em; }
.user-bar .ub-logout:hover { color: var(--red); }
.user-bar .ub-share { color: var(--accent2); cursor: pointer; font-size: 0.82em; }
.user-bar .ub-share:hover { text-decoration: underline; }

/* ====== Tab Bar ====== */
.tab-bar { display: flex; background: var(--card); border-radius: 14px; padding: 4px; margin: 8px 0; border: 1px solid var(--border); }
.tab-btn { flex: 1; padding: 10px 0; text-align: center; border-radius: 10px; cursor: pointer; font-size: 0.92em; font-weight: 600; color: var(--text3); background: transparent; border: none; transition: all 0.2s; }
.tab-btn.active { background: var(--accent); color: #fff; }
.tab-btn:disabled { opacity: 0.4; cursor: not-allowed; background: transparent !important; color: var(--text3) !important; }

/* ====== Search Panel ====== */
.panel { display: none; }
.panel.show { display: block; }
.search-wrap { position: relative; margin: 0 0 12px; }
.search-wrap input { width: 100%; padding: 14px 48px 14px 18px; background: var(--card); border: 2px solid var(--border); border-radius: 14px; color: var(--text); font-size: 1em; outline: none; transition: border-color 0.2s; }
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap input::placeholder { color: var(--text3); }
.search-wrap input:disabled { opacity: 0.4; cursor: not-allowed; }
.search-wrap .search-icon { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 1.2em; pointer-events: none; }
.suggestions { position: absolute; top: 100%; left: 0; right: 0; background: var(--card); border: 1px solid var(--border); border-radius: 10px; margin-top: 4px; max-height: 240px; overflow-y: auto; z-index: 100; display: none; }
.suggestions.show { display: block; }
.suggestion-item { padding: 10px 18px; cursor: pointer; font-size: 0.95em; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.suggestion-item:last-child { border-bottom: none; }
.suggestion-item:hover, .suggestion-item.active { background: var(--card2); }
.suggestion-item .s-word { font-weight: 600; }
.suggestion-item .s-root { font-size: 0.78em; color: var(--accent2); background: rgba(124,92,252,0.12); padding: 2px 8px; border-radius: 6px; }
.random-btn { display: block; width: 100%; padding: 11px 0; background: var(--card2); border: 1px solid var(--border); border-radius: 12px; color: var(--accent2); font-size: 0.9em; cursor: pointer; transition: all 0.15s; margin-bottom: 12px; }
.random-btn:hover { background: var(--border); }
.random-btn:disabled { opacity: 0.4; cursor: not-allowed; color: var(--text3); }

/* ====== Flashcard ====== */
.flash-nav { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 8px 0; }
.flash-nav .nav-btn { padding: 10px 20px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 0.9em; cursor: pointer; transition: all 0.15s; }
.flash-nav .nav-btn:hover { border-color: var(--accent); background: var(--card2); }
.flash-nav .nav-btn:disabled { opacity: 0.3; cursor: default; border-color: var(--border); color: var(--text3); }
.flash-nav .nav-btn:disabled:hover { background: var(--card); border-color: var(--border); }
.flash-nav .nav-progress { font-size: 0.85em; color: var(--text3); min-width: 80px; text-align: center; }
.flash-nav .nav-progress strong { color: var(--accent2); }
.flash-options { display: flex; justify-content: center; gap: 16px; padding: 4px 0 12px; }
.flash-options .opt-btn { padding: 6px 14px; background: var(--card2); border: 1px solid var(--border); border-radius: 8px; color: var(--text3); font-size: 0.78em; cursor: pointer; transition: all 0.15s; }
.flash-options .opt-btn.active { background: rgba(124,92,252,0.15); border-color: var(--accent); color: var(--accent2); }
.flash-options .opt-btn:hover { border-color: var(--accent); }
.flash-options .opt-btn:disabled { opacity: 0.4; cursor: not-allowed; color: var(--text3) !important; border-color: var(--border) !important; background: var(--card2) !important; }
.flash-usage { text-align: center; font-size: 0.75em; color: var(--text3); padding: 4px 0 8px; }
.flash-usage strong { color: var(--orange); }

/* ====== Word Card ====== */
.result-area { display: none; }
.result-area.show { display: block; animation: fadeUp 0.3s ease; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.word-card { background: var(--card); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; }
.word-header { padding: 20px 20px 16px; border-bottom: 1px solid var(--border); }
.word-main { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
.word-main .w-word { font-size: 1.8em; font-weight: 700; }
.theme-light .word-main .w-word { color: #1a1a2e; }
.theme-dark .word-main .w-word, .word-main .w-word { color: #fff; }
.word-main .w-ipa { font-size: 1em; color: var(--text3); }
.w-meaning { margin-top: 6px; color: var(--text2); font-size: 0.95em; }
.root-section { padding: 16px 20px; border-bottom: 1px solid var(--border); }
.root-section .section-label, .analysis-section .section-label, .related-section .section-label, .memory-section .section-label { font-size: 0.75em; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text3); margin-bottom: 8px; }
.root-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(124,92,252,0.12); border: 1px solid rgba(124,92,252,0.25); padding: 6px 14px; border-radius: 20px; font-size: 0.9em; }
.root-badge .rb-root { font-weight: 700; color: var(--accent2); }
.root-badge .rb-meaning { color: var(--text2); }
.form-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(245,158,11,0.12); border: 1px solid rgba(245,158,11,0.25); padding: 6px 14px; border-radius: 20px; font-size: 0.9em; color: var(--orange); }
.analysis-section { padding: 16px 20px; border-bottom: 1px solid var(--border); }
.analysis-text { font-size: 0.93em; color: var(--text); line-height: 1.7; }
.analysis-text .hl-root { color: var(--accent2); font-weight: 600; }
.related-section { padding: 16px 20px; border-bottom: 1px solid var(--border); }
.related-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
.related-word { padding: 8px 14px; background: var(--card2); border: 1px solid var(--border); border-radius: 10px; cursor: pointer; transition: all 0.15s; text-decoration: none; color: var(--text); font-size: 0.9em; font-weight: 500; }
.related-word:hover { border-color: var(--accent); background: rgba(124,92,252,0.08); }
.related-word.current { border-color: var(--accent); background: rgba(124,92,252,0.15); color: var(--accent2); }
.memory-section { padding: 16px 20px; background: linear-gradient(135deg, rgba(124,92,252,0.06), rgba(167,139,250,0.04)); }
.memory-sentence { font-size: 1em; line-height: 1.7; color: var(--text); padding: 12px 16px; background: rgba(124,92,252,0.06); border-radius: 10px; border-left: 3px solid var(--accent); }
.memory-sentence .mem-highlight { color: var(--accent2); font-weight: 700; }

/* ====== Payment Overlay ====== */
.payment-overlay {
  display: none; position: fixed; inset: 0; z-index: 2000;
  background: var(--overlay-bg); align-items: center; justify-content: center;
  padding: 20px;
}
.payment-overlay.show { display: flex; }
.payment-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 20px; padding: 28px 24px;
  width: 100%; max-width: 400px; text-align: center;
}
.payment-title { font-size: 1.2em; font-weight: 700; margin-bottom: 4px; }
.payment-sub { color: var(--text3); font-size: 0.85em; margin-bottom: 20px; }
.payment-qr { width: 200px; height: 200px; border-radius: 12px; margin: 0 auto 16px; display: block; }
.payment-price { font-size: 1.1em; margin-bottom: 4px; }
.payment-price .big { font-size: 1.6em; font-weight: 800; color: var(--accent2); }
.payment-price .strike { text-decoration: line-through; color: var(--text3); font-size: 0.85em; margin-left: 6px; }
.payment-steps { text-align: left; font-size: 0.82em; color: var(--text2); margin: 16px 0; line-height: 2; }
.payment-steps span.num { display: inline-block; width: 20px; height: 20px; line-height: 20px; text-align: center; background: var(--accent); color: #fff; border-radius: 50%; font-size: 0.8em; margin-right: 6px; }
.payment-note { font-size: 0.75em; color: var(--text3); margin-top: 8px; }
.payment-close { margin-top: 16px; color: var(--text3); cursor: pointer; font-size: 0.85em; }
.payment-close:hover { color: var(--text); }

/* ====== Empty / Stats / Toast ====== */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text3); }
.empty-state .empty-icon { font-size: 3em; margin-bottom: 12px; }
.empty-state p { font-size: 0.95em; }
.stats-bar { display: flex; justify-content: center; align-items: center; gap: 4px; padding: 12px 0; font-size: 0.78em; color: var(--text3); }
.stats-bar strong { color: var(--text2); margin: 0 2px; }
.toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--card); border: 1px solid var(--border); padding: 10px 20px; border-radius: 10px; font-size: 0.85em; color: var(--text); box-shadow: 0 8px 30px rgba(0,0,0,0.4); z-index: 3000; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
.toast.show { opacity: 1; }
.main-app { display: none; }
.main-app.show { display: block; }
.loading-state { text-align: center; padding: 80px 20px; color: var(--text3); }
.loading-state .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 400px) {
  .word-main .w-word { font-size: 1.5em; }
  .flash-nav .nav-btn { padding: 10px 14px; font-size: 0.85em; }
  .payment-card { padding: 20px 16px; }
}
</style>
</head>
<body class="theme-dark">

<!-- ====== Auth Overlay ====== -->
<div class="auth-overlay" id="authOverlay">
  <div class="auth-card">
    <div class="auth-logo">单词连环记</div>
    <div class="auth-sub">形近词串联记忆法 · 四级词库</div>
    <div class="auth-tabs">
      <button class="auth-tab-btn active" id="authTabLogin" onclick="switchAuthTab('login')">登录</button>
      <button class="auth-tab-btn" id="authTabRegister" onclick="switchAuthTab('register')">注册</button>
    </div>

    <!-- Login Form -->
    <div id="loginForm">
      <label class="auth-field-label">用户名</label>
      <input class="auth-input" type="text" id="loginUsername" placeholder="输入用户名" autocomplete="username">
      <label class="auth-field-label">密码</label>
      <input class="auth-input" type="password" id="loginPassword" placeholder="输入密码（6位以上）" autocomplete="current-password">
      <button class="auth-btn" id="loginBtn" onclick="handleLogin()">登 录</button>
      <div class="auth-error" id="loginError"></div>
    </div>

    <!-- Register Form -->
    <div id="registerForm" style="display:none;">
      <label class="auth-field-label">用户名</label>
      <input class="auth-input" type="text" id="regUsername" placeholder="设置用户名（字母+数字，4-20位）" autocomplete="off">
      <label class="auth-field-label">密码</label>
      <input class="auth-input" type="password" id="regPassword" placeholder="设置密码（6位以上）" autocomplete="new-password">
      <label class="auth-field-label">分享码（选填）</label>
      <div class="auth-referral-row">
        <input class="auth-input" type="text" id="regReferral" placeholder="朋友给的分享码，填了双方各+7天" autocomplete="off">
      </div>
      <button class="auth-btn" id="regBtn" onclick="handleRegister()">注 册</button>
      <div class="auth-error" id="regError"></div>
    </div>
  </div>
</div>

<!-- ====== Main App ====== -->
<div class="main-app" id="mainApp">
  <div class="container">

    <!-- Header -->
    <div class="header">
      <div class="logo">单词连环记</div>
      <div class="header-actions">
        <select class="header-version" id="versionSelect" onchange="switchVersion()">
          <option value="cet4">四级</option>
        </select>
        <button class="header-btn" id="themeBtn" onclick="toggleTheme()" title="切换主题">🌙</button>
      </div>
    </div>

    <!-- User Bar -->
    <div class="user-bar">
      <div class="ub-left">
        <span class="ub-name" id="ubName">...</span>
        <span class="ub-badge" id="ubBadge">免费试用</span>
        <span class="ub-days" id="ubDays"></span>
      </div>
      <div>
        <span class="ub-share" id="ubShare" onclick="showShareCode()" title="点击复制分享码"></span>
        <span class="ub-logout" onclick="handleLogout()">退出</span>
      </div>
    </div>

    <!-- Tab Bar -->
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="flashcard" id="tabFlashcard" onclick="switchTab('flashcard')">📖 记单词</button>
      <button class="tab-btn" data-tab="search" id="tabSearch" onclick="switchTab('search')">🔍 查单词</button>
    </div>

    <!-- Search Panel -->
    <div class="panel" id="searchPanel">
      <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="输入单词..." autocomplete="off" disabled>
        <span class="search-icon">⌘</span>
        <div class="suggestions" id="suggestions"></div>
      </div>
      <button class="random-btn" id="randomBtn" disabled>✨ 随便看看一个单词</button>
      <div class="stats-bar" id="statsBar"></div>
      <div class="result-area" id="searchResult"></div>
      <div class="empty-state" id="searchEmpty">
        <div class="empty-icon">📖</div>
        <p>输入单词查看词根拆解和串联记忆</p>
      </div>
    </div>

    <!-- Flashcard Panel -->
    <div class="panel show" id="flashcardPanel">
      <div class="flash-nav">
        <button class="nav-btn" id="prevBtn" onclick="prevCard()">◀ 上一个</button>
        <span class="nav-progress" id="progressText">第 <strong>-</strong>/<span id="totalText">...</span> 个</span>
        <button class="nav-btn" id="nextBtn" onclick="nextCard()">下一个 ▶</button>
      </div>
      <div class="flash-options">
        <button class="opt-btn active" id="shuffleOffBtn" onclick="setShuffle(false)">📋 顺序</button>
        <button class="opt-btn" id="shuffleOnBtn" onclick="setShuffle(true)">🎲 随机</button>
      </div>
      <div class="flash-usage" id="flashUsage"></div>
      <div class="result-area" id="flashResult"></div>
      <div class="empty-state" id="flashEmpty">
        <div class="empty-icon">📖</div>
        <p>正在加载词库...</p>
      </div>
    </div>
  </div>
</div>

<!-- ====== Payment Overlay ====== -->
<div class="payment-overlay" id="paymentOverlay">
  <div class="payment-card">
    <div class="payment-title">🔒 试用到期 · 解锁全功能</div>
    <div class="payment-sub">扫码付款，5分钟内自动开通</div>
    <img class="payment-qr" src="qrcode-wxpay.png" alt="微信收款码" id="paymentQR">
    <div class="payment-price">
      <span>🎁 首月 </span><span class="big">¥1</span>
      <span class="strike">¥6.9/月</span>
    </div>
    <div class="payment-steps">
      <div><span class="num">1</span> 截图或长按保存付款码</div>
      <div><span class="num">2</span> 打开微信扫一扫付款</div>
      <div><span class="num">3</span> ⚠️ 付款时<strong>备注你的用户名</strong></div>
      <div><span class="num">4</span> 付款后<strong>刷新页面</strong>即可解锁</div>
    </div>
    <div class="payment-note">💡 如需帮助，请在抖音私信联系</div>
    <div class="payment-close" onclick="closePayment()">暂不付款，继续免费版</div>
  </div>
</div>

<!-- ====== Toast ====== -->
<div class="toast" id="toast"></div>

<script>
// =============================================
// Supabase Config
// =============================================
const SUPABASE_URL = 'https://xbstmjtypywukntjhdon.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_H_ltvJ4tK93xEu_DbXhDfQ_RTMT1C_S';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// =============================================
// Global State
// =============================================
let currentUser = null;
let userProfile = null;
let authMode = 'login';
let wordsData = [];
let wordIndex = {};
let currentTab = 'flashcard';
let flashQueue = [];
let flashIdx = 0;
let shuffleMode = false;
let currentVersion = 'cet4';
let dailyLimits = { orderUsed: 0, randomUsed: 0, maxPerType: 2 };

// =============================================
// Theme
// =============================================
function initTheme() {
  const saved = localStorage.getItem('wordchain_theme') || 'dark';
  document.body.className = 'theme-' + saved;
  document.getElementById('themeBtn').textContent = saved === 'light' ? '☀️' : '🌙';
}
function toggleTheme() {
  const current = document.body.className.includes('theme-light') ? 'dark' : 'light';
  document.body.className = 'theme-' + current;
  document.getElementById('themeBtn').textContent = current === 'light' ? '☀️' : '🌙';
  localStorage.setItem('wordchain_theme', current);
}

// =============================================
// Auth
// =============================================
function switchAuthTab(mode) {
  authMode = mode;
  document.getElementById('authTabLogin').classList.toggle('active', mode === 'login');
  document.getElementById('authTabRegister').classList.toggle('active', mode === 'register');
  document.getElementById('loginForm').style.display = mode === 'login' ? 'block' : 'none';
  document.getElementById('registerForm').style.display = mode === 'register' ? 'block' : 'none';
  document.getElementById('loginError').textContent = '';
  document.getElementById('regError').textContent = '';
}

function toEmail(username) { return username.trim().toLowerCase() + '@wordchain.app'; }

function generateReferralCode() {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  let code = '';
  for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

async function handleRegister() {
  const username = document.getElementById('regUsername').value.trim();
  const password = document.getElementById('regPassword').value;
  const referral = document.getElementById('regReferral').value.trim().toUpperCase();
  const errEl = document.getElementById('regError');

  if (!username || username.length < 2 || username.length > 20 || !/^[a-zA-Z0-9_\u4e00-\u9fa5]+$/.test(username)) {
    errEl.textContent = '用户名需2-20位，字母/数字/中文/下划线'; return;
  }
  if (!password || password.length < 6) { errEl.textContent = '密码需6位以上'; return; }

  const btn = document.getElementById('regBtn');
  btn.disabled = true; btn.textContent = '注册中...'; errEl.textContent = '';

  try {
    const email = toEmail(username);
    const { data: authData, error: authErr } = await supabase.auth.signUp({ email, password });
    if (authErr) throw authErr;
    if (!authData.user) throw new Error('注册失败，请重试');

    const expiry = new Date(); expiry.setDate(expiry.getDate() + 7);
    let referrerId = null;
    if (referral) {
      const { data: refUser } = await supabase
        .from('users').select('id').eq('referral_code', referral).single();
      if (refUser) referrerId = refUser.id;
    }

    const code = generateReferralCode();
    const { error: insertErr } = await supabase.from('users').insert({
      id: authData.user.id, username, expire_at: expiry.toISOString(), referral_code: code, referrer_id: referrerId
    });
    if (insertErr) throw insertErr;

    if (referrerId) {
      await supabase.rpc('add_trial_days', { user_id: referrerId, days: 7 }).maybeSingle();
    }

    await loadUserProfile(authData.user);
    showMainApp();
  } catch (e) {
    errEl.textContent = e.message || '注册失败';
  } finally {
    btn.disabled = false; btn.textContent = '注 册';
  }
}

async function handleLogin() {
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  if (!username || !password) { errEl.textContent = '请填写用户名和密码'; return; }

  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = '登录中...'; errEl.textContent = '';

  try {
    const email = toEmail(username);
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) throw error;
    await loadUserProfile(data.user);
    showMainApp();
  } catch (e) {
    errEl.textContent = '用户名或密码错误';
  } finally {
    btn.disabled = false; btn.textContent = '登 录';
  }
}

async function handleLogout() {
  await supabase.auth.signOut();
  currentUser = null; userProfile = null;
  document.getElementById('authOverlay').style.display = 'flex';
  document.getElementById('mainApp').classList.remove('show');
  document.getElementById('loginUsername').value = '';
  document.getElementById('loginPassword').value = '';
}

async function loadUserProfile(user) {
  currentUser = user;
  const { data } = await supabase.from('users').select('*').eq('id', user.id).single();
  if (!data) { await handleLogout(); return; }
  userProfile = data;
  resetDailyCounts();
}

function resetDailyCounts() {
  if (!userProfile) return;
  const today = new Date().toISOString().slice(0, 10);
  if (userProfile.last_reset_date !== today) {
    userProfile.daily_flash_order_count = 0;
    userProfile.daily_flash_random_count = 0;
    userProfile.daily_search_count = 0;
    userProfile.last_reset_date = today;
    supabase.from('users').update({
      daily_flash_order_count: 0, daily_flash_random_count: 0,
      daily_search_count: 0, last_reset_date: today
    }).eq('id', currentUser.id).then(() => {});
  }
  dailyLimits.orderUsed = userProfile.daily_flash_order_count || 0;
  dailyLimits.randomUsed = userProfile.daily_flash_random_count || 0;
}

function showMainApp() {
  document.getElementById('authOverlay').style.display = 'none';
  document.getElementById('mainApp').classList.add('show');
  updateUserBar();
  applyTrialRestrictions();
  loadWordData();
}

// =============================================
// User Bar
// =============================================
function updateUserBar() {
  if (!userProfile) return;
  document.getElementById('ubName').textContent = userProfile.username;
  document.getElementById('ubShare').textContent = '分享码: ' + userProfile.referral_code;

  const now = new Date();
  const expireAt = new Date(userProfile.expire_at);
  const daysLeft = Math.ceil((expireAt - now) / (1000 * 60 * 60 * 24));

  if (userProfile.paid) {
    document.getElementById('ubBadge').textContent = 'VIP会员';
    document.getElementById('ubBadge').className = 'ub-badge paid';
    document.getElementById('ubDays').textContent = '';
  } else if (daysLeft > 0) {
    document.getElementById('ubBadge').textContent = '免费试用';
    document.getElementById('ubBadge').className = 'ub-badge free';
    document.getElementById('ubDays').textContent = '剩余 ' + daysLeft + ' 天';
  } else {
    document.getElementById('ubBadge').textContent = '试用到期';
    document.getElementById('ubBadge').className = 'ub-badge expired';
    document.getElementById('ubDays').textContent = '';
  }
}

function showShareCode() {
  if (!userProfile) return;
  const code = userProfile.referral_code;
  const text = '【单词连环记】邀请码：' + code + '\n注册时填写后，双方各多得7天免费试用！';
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => showToast('分享文案已复制到剪贴板'));
  } else {
    prompt('复制这段文案发给朋友：', text);
  }
}

// =============================================
// Trial & Payment
// =============================================
function isTrialExpired() {
  if (!userProfile || userProfile.paid) return false;
  return new Date() > new Date(userProfile.expire_at);
}

function applyTrialRestrictions() {
  const expired = isTrialExpired();
  const searchInput = document.getElementById('searchInput');
  const randomBtn = document.getElementById('randomBtn');
  const tabSearch = document.getElementById('tabSearch');

  if (expired) {
    searchInput.disabled = true;
    searchInput.placeholder = '试用到期，请付费解锁查词功能';
    randomBtn.disabled = true;
    tabSearch.disabled = true;
    tabSearch.title = '试用到期，付费后解锁查单词功能';
    updateFlashUsageDisplay();
  } else {
    searchInput.disabled = false;
    searchInput.placeholder = '输入单词...';
    randomBtn.disabled = false;
    tabSearch.disabled = false;
    tabSearch.title = '';
    document.getElementById('flashUsage').innerHTML = '';
  }
}

function updateFlashUsageDisplay() {
  if (!isTrialExpired()) { document.getElementById('flashUsage').innerHTML = ''; return; }
  const orderLeft = Math.max(0, dailyLimits.maxPerType - dailyLimits.orderUsed);
  const randomLeft = Math.max(0, dailyLimits.maxPerType - dailyLimits.randomUsed);
  document.getElementById('flashUsage').innerHTML =
    '⚠️ 今日剩余：<strong>顺序 ' + orderLeft + '</strong> 组 | <strong>随机 ' + randomLeft + '</strong> 组';
}

async function incrementFlashUsage() {
  if (!userProfile || userProfile.paid) return true;
  if (!isTrialExpired()) return true;

  const type = shuffleMode ? 'daily_flash_random_count' : 'daily_flash_order_count';
  const used = shuffleMode ? 'randomUsed' : 'orderUsed';

  if (dailyLimits[used] >= dailyLimits.maxPerType) {
    document.getElementById('paymentOverlay').classList.add('show');
    return false;
  }

  dailyLimits[used]++;
  userProfile[type] = dailyLimits[used];
  updateFlashUsageDisplay();

  supabase.from('users').update({ [type]: dailyLimits[used] }).eq('id', currentUser.id).then(() => {});
  return true;
}

function closePayment() {
  document.getElementById('paymentOverlay').classList.remove('show');
}

// =============================================
// Word Data
// =============================================
async function loadWordData() {
  try {
    const resp = await fetch('data_cet4.json');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    wordsData = data.words || [];
    wordIndex = {};
    wordsData.forEach(w => { wordIndex[w.word.toLowerCase()] = w; });
    updateStats();
    resetFlashQueue();
    document.getElementById('flashEmpty').style.display = 'none';
  } catch (err) {
    document.getElementById('flashEmpty').innerHTML =
      '<div class="empty-icon">⚠️</div><p>词库加载失败</p><p style="font-size:0.85em;color:var(--text3);">请确认 data_cet4.json 文件存在</p>';
    console.error(err);
  }
}

function updateStats() {
  const total = wordsData.length;
  const groups = new Set(wordsData.map(w => w.groupId)).size;
  document.getElementById('statsBar').innerHTML = '词库共<strong>' + total + '</strong>个单词 · <strong>' + groups + '</strong>个词组';
}

// =============================================
// Tab Switching
// =============================================
function switchTab(tab) {
  if (tab === 'search' && isTrialExpired()) {
    document.getElementById('paymentOverlay').classList.add('show');
    return;
  }
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.getElementById('searchPanel').classList.toggle('show', tab === 'search');
  document.getElementById('flashcardPanel').classList.toggle('show', tab === 'flashcard');
  if (tab === 'flashcard') updateFlashDisplay();
}

// =============================================
// Search
// =============================================
const searchInput = document.getElementById('searchInput');
const suggestionsEl = document.getElementById('suggestions');
let selectedIdx = -1;

searchInput.addEventListener('input', () => {
  const query = searchInput.value.trim().toLowerCase();
  selectedIdx = -1;
  if (!query) { suggestionsEl.classList.remove('show'); return; }
  const matches = wordsData.filter(w => w.word.toLowerCase().includes(query)).slice(0, 8);
  if (!matches.length) { suggestionsEl.classList.remove('show'); return; }
  suggestionsEl.innerHTML = matches.map((w, i) =>
    '<div class="suggestion-item" data-idx="' + i + '" data-word="' + w.word + '">' +
    '<span class="s-word">' + highlightMatch(w.word, query) + '</span>' +
    (w.root ? '<span class="s-root">' + w.root + '(' + w.rootMeaning + ')</span>' : '<span class="s-root">形近词</span>') +
    '</div>').join('');
  suggestionsEl.classList.add('show');
  suggestionsEl.querySelectorAll('.suggestion-item').forEach(item => {
    item.addEventListener('click', () => {
      searchInput.value = item.dataset.word;
      suggestionsEl.classList.remove('show');
      showSearchResult(item.dataset.word);
    });
  });
});

searchInput.addEventListener('keydown', (e) => {
  const items = suggestionsEl.querySelectorAll('.suggestion-item');
  if (!suggestionsEl.classList.contains('show') || !items.length) {
    if (e.key === 'Enter') { const q = searchInput.value.trim(); if (q) { suggestionsEl.classList.remove('show'); showSearchResult(q); } }
    return;
  }
  if (e.key === 'ArrowDown') { e.preventDefault(); selectedIdx = Math.min(selectedIdx + 1, items.length - 1); items.forEach((it,i) => it.classList.toggle('active', i === selectedIdx)); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); selectedIdx = Math.max(selectedIdx - 1, 0); items.forEach((it,i) => it.classList.toggle('active', i === selectedIdx)); }
  else if (e.key === 'Enter') { e.preventDefault(); if (selectedIdx >= 0 && items[selectedIdx]) { searchInput.value = items[selectedIdx].dataset.word; suggestionsEl.classList.remove('show'); showSearchResult(items[selectedIdx].dataset.word); } }
  else if (e.key === 'Escape') { suggestionsEl.classList.remove('show'); }
});

function highlightMatch(word, query) {
  const idx = word.toLowerCase().indexOf(query);
  if (idx === -1) return word;
  return word.substring(0, idx) + '<span style="color:var(--accent2);font-weight:700;">' + word.substring(idx, idx + query.length) + '</span>' + word.substring(idx + query.length);
}

document.addEventListener('click', (e) => { if (!e.target.closest('.search-wrap')) suggestionsEl.classList.remove('show'); });

document.getElementById('randomBtn').addEventListener('click', () => {
  if (!wordsData.length) return;
  const random = wordsData[Math.floor(Math.random() * wordsData.length)];
  searchInput.value = random.word;
  showSearchResult(random.word);
});

function showSearchResult(query) {
  const wordObj = findWord(query.trim().toLowerCase());
  if (!wordObj) {
    document.getElementById('searchResult').innerHTML =
      '<div class="word-card"><div style="padding:40px 20px;text-align:center;color:var(--text3);"><div style="font-size:2em;margin-bottom:8px;">🔍</div><p>未找到 "' + query + '"</p></div></div>';
    document.getElementById('searchResult').classList.add('show');
    document.getElementById('searchEmpty').style.display = 'none';
    return;
  }
  document.getElementById('searchResult').innerHTML = renderWordCard(wordObj);
  document.getElementById('searchResult').classList.add('show');
  document.getElementById('searchEmpty').style.display = 'none';
  document.getElementById('searchResult').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// =============================================
// Flashcard
// =============================================
function resetFlashQueue() {
  flashQueue = shuffleMode ? [...wordsData].sort(() => Math.random() - 0.5) : [...wordsData];
  flashIdx = 0;
  document.getElementById('totalText').textContent = flashQueue.length;
}

function setShuffle(on) {
  if (!userProfile || userProfile.paid) { /* paid users: no limits */ }
  else if (isTrialExpired()) {
    const limitKey = on ? 'randomUsed' : 'orderUsed';
    if (dailyLimits[limitKey] >= dailyLimits.maxPerType) {
      document.getElementById('paymentOverlay').classList.add('show');
      return;
    }
  }
  shuffleMode = on;
  document.getElementById('shuffleOffBtn').classList.toggle('active', !on);
  document.getElementById('shuffleOnBtn').classList.toggle('active', on);
  resetFlashQueue();
  updateFlashDisplay();
}

async function prevCard() {
  if (!flashQueue.length) return;
  const allowed = await incrementFlashUsage();
  if (!allowed) return;
  flashIdx = (flashIdx - 1 + flashQueue.length) % flashQueue.length;
  updateFlashDisplay();
}

async function nextCard() {
  if (!flashQueue.length) return;
  const allowed = await incrementFlashUsage();
  if (!allowed) return;
  flashIdx = (flashIdx + 1) % flashQueue.length;
  updateFlashDisplay();
}

function updateFlashDisplay() {
  if (!flashQueue.length) {
    document.getElementById('flashResult').innerHTML =
      '<div class="word-card"><div style="padding:40px 20px;text-align:center;color:var(--text3);"><p>词库为空</p></div></div>';
    document.getElementById('flashResult').classList.add('show');
    return;
  }
  const wordObj = flashQueue[flashIdx];
  document.getElementById('flashResult').innerHTML = renderWordCard(wordObj);
  document.getElementById('flashResult').classList.add('show');
  document.getElementById('progressText').innerHTML =
    '第 <strong>' + (flashIdx + 1) + '</strong>/<span id="totalText">' + flashQueue.length + '</span> 个';
  applyTrialRestrictions();
}

// Touch swipe
let touchStartX = 0;
document.addEventListener('DOMContentLoaded', () => {
  const el = document.getElementById('flashcardPanel');
  el.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
  el.addEventListener('touchend', e => {
    if (currentTab !== 'flashcard') return;
    const diff = touchStartX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 60) { if (diff > 0) nextCard(); else prevCard(); }
  });
});

// =============================================
// Word Card Render
// =============================================
function renderWordCard(wordObj) {
  const sameGroup = wordsData.filter(w => w.groupId === wordObj.groupId && w.word !== wordObj.word);
  const memorySentence = wordObj.sentence || '';

  let html = '<div class="word-card">';
  html += '<div class="word-header"><div class="word-main"><span class="w-word">' + wordObj.word + '</span><span class="w-ipa">' + wordObj.ipa + '</span></div><div class="w-meaning">' + wordObj.meaning + '</div></div>';

  // Root or 形近词 badge
  if (wordObj.root) {
    html += '<div class="root-section"><div class="section-label">词根拆解</div><div class="root-badge">词根 <span class="rb-root">' + wordObj.root + '</span>' + (wordObj.rootMeaning ? '<span class="rb-meaning"> · ' + wordObj.rootMeaning + '</span>' : '') + '</div></div>';
  } else {
    html += '<div class="root-section"><div class="section-label">形近词组</div><div class="form-badge">📎 形近词串联记忆</div></div>';
  }

  if (wordObj.analysis) {
    html += '<div class="analysis-section"><div class="section-label">构成分析</div><div class="analysis-text">' + formatAnalysis(wordObj.analysis) + '</div></div>';
  }

  if (sameGroup.length > 0) {
    html += '<div class="related-section"><div class="section-label">同组关联单词 (' + (sameGroup.length + 1) + '个)</div><div class="related-grid"><span class="related-word current">' + wordObj.word + '</span>' + sameGroup.map(w => '<span class="related-word" onclick="clickRelatedWord(\'' + w.word + '\')">' + w.word + '</span>').join('') + '</div></div>';
  }

  if (memorySentence) {
    html += '<div class="memory-section"><div class="section-label">串联记忆口诀</div><div class="memory-sentence">' + highlightWordsInSentence(memorySentence, wordObj.groupId) + '</div></div>';
  }

  html += '</div>';
  return html;
}

function clickRelatedWord(word) {
  if (currentTab === 'search') { searchInput.value = word; showSearchResult(word); }
  else { const idx = flashQueue.findIndex(w => w.word.toLowerCase() === word.toLowerCase()); if (idx >= 0) { flashIdx = idx; updateFlashDisplay(); } }
}

// =============================================
// Helpers
// =============================================
function findWord(query) {
  if (wordIndex[query]) return wordIndex[query];
  for (const k of Object.keys(wordIndex)) { if (k.startsWith(query)) return wordIndex[k]; }
  for (const k of Object.keys(wordIndex)) { if (k.includes(query)) return wordIndex[k]; }
  return null;
}

function formatAnalysis(text) {
  return text.replace(/([a-z]+)\(([^)]+)\)/gi, '<span class="hl-root">$1</span>($2)').replace(/→/g, '<span style="color:var(--accent2);">→</span>');
}

function highlightWordsInSentence(sentence, groupId) {
  const groupWords = wordsData.filter(w => w.groupId === groupId).map(w => w.word);
  if (!groupWords.length) return sentence;
  let result = sentence;
  groupWords.sort((a, b) => b.length - a.length).forEach(w => {
    const regex = new RegExp('\\b(' + w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')\\b', 'gi');
    result = result.replace(regex, '<span class="mem-highlight">$1</span>');
  });
  return result;
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// =============================================
// Version Switch (placeholder for future)
// =============================================
function switchVersion() {
  currentVersion = document.getElementById('versionSelect').value;
  showToast('版本切换功能即将上线');
}

// =============================================
// Init
// =============================================
window.addEventListener('load', async () => {
  initTheme();

  // Check existing session
  const { data: { session } } = await supabase.auth.getSession();
  if (session && session.user) {
    await loadUserProfile(session.user);
    if (userProfile) showMainApp();
  }

  // Listen for auth changes
  supabase.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_OUT') {
      currentUser = null; userProfile = null;
    }
  });
});
</script>
