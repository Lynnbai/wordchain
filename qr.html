<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>加好友 · 单词连环记</title>
<style>
:root {
  --bg: #0a0a0f;
  --card: #12121a;
  --text: #e4e4e7;
  --text2: #a1a1aa;
  --accent2: #a78bfa;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 20px;
  text-align: center;
}
h1 {
  font-size: 1.4em;
  margin-bottom: 8px;
  font-weight: 700;
}
.sub {
  color: var(--text2);
  font-size: 0.9em;
  margin-bottom: 32px;
}
.qr-wrapper {
  background: #fff;
  border-radius: 20px;
  padding: 24px;
  box-shadow: 0 8px 40px rgba(124,92,252,0.15);
}
.qr-wrapper img {
  width: 240px;
  height: 240px;
  display: block;
  border-radius: 8px;
}
.tip {
  margin-top: 24px;
  color: var(--text2);
  font-size: 0.85em;
  line-height: 1.6;
}
.tip strong {
  color: var(--accent2);
}
.back-link {
  margin-top: 32px;
  color: var(--text2);
  font-size: 0.85em;
  text-decoration: none;
}
</style>
</head>
<body>

<h1>添加企业微信好友</h1>
<p class="sub">获取更多词根组更新</p>

<div class="qr-wrapper">
  <img src="qrcode.png" alt="企业微信二维码">
</div>

<p class="tip">
  <strong>截图保存二维码</strong><br>
  打开微信 → 扫一扫 → 选择相册中的截图
</p>

<a href="index.html" class="back-link">← 返回单词连环记</a>

</body>
</html>
